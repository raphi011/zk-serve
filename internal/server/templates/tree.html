{{define "tree-node"}}
{{if .IsDir}}
<details{{if .IsOpen}} open{{end}}>
  <summary class="tree-folder"><span class="tree-chevron">▸</span>{{.Name}}</summary>
  <div class="tree-children">
    {{range .Children}}{{template "tree-node" .}}{{end}}
  </div>
</details>
{{else}}
<a class="tree-item{{if .IsActive}} active{{end}}" href="/note/{{.Path}}">
  <span class="tree-file-dot"></span>{{.Name}}
</a>
{{end}}
{{end}}

{{define "tree"}}
<div class="sidebar-section-label">Notes</div>
{{range .Tree}}{{template "tree-node" .}}{{end}}
{{end}}
