{{define "list"}}
{{range .Notes}}
<div class="result-item">
  <a class="result-link" href="/note/{{.Path}}">
    <div class="result-title">{{if .Title}}{{.Title}}{{else}}{{.FilenameStem}}{{end}}</div>
    <div class="result-meta">{{.Modified | fmtDate}}</div>
    {{if .Snippet}}<div class="result-snippet">{{.Snippet | safeSnippet}}</div>{{end}}
  </a>
  {{if .Tags}}<div class="result-tags">{{range .Tags}}<span class="result-tag" data-tag="{{.}}">{{.}}</span>{{end}}</div>{{end}}
</div>
{{else}}
<div class="sidebar-empty">No results</div>
{{end}}
{{end}}
